name: Bug report
description: Report a reproducible visual or interaction defect
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest HTML snippet or clear steps that reproduce the issue.
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - Dark
        - Light
        - Both
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      placeholder: Chrome 137, macOS 15
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or recordings
      description: Drag visual evidence here when applicable.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: My reproduction does not require proprietary font files.
          required: true
